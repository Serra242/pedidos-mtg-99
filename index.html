<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos El99</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toast" class="toast"></div>

<div id="auth-container" class="overlay">
    <div class="auth-wrapper">
        <div class="auth-header">
            <h1>El99 <span>Market</span></h1>
            <p>Portal oficial de pedidos MTG</p>
        </div>

        <div id="login-box" class="auth-box">
            <h2>Bienvenido Jugador</h2>
            <form id="formLogin" onsubmit="iniciarSesion(event)">
                <div class="input-group">
                    <label>Usuario</label>
                    <input type="text" id="login-user" required placeholder="Tu nombre">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-pass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <p class="auth-switch">¿No estás en el sistema? <button type="button" class="btn-link" onclick="mostrarRegistro()">Regístrate</button></p>
        </div>

        <div id="register-box" class="auth-box" style="display: none;">
            <h2>Nuevo Registro</h2>
            <form id="formRegister" onsubmit="registrarUsuario(event)">
                <div class="input-group">
                    <label>Nombre de Usuario</label>
                    <input type="text" id="reg-user" required placeholder="Ej: JaceBeleren">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-pass" required placeholder="Crea una contraseña">
                </div>
                <button type="submit" class="btn-secondary">Crear Cuenta</button>
            </form>
            <p class="auth-switch">¿Ya tienes cuenta? <button type="button" class="btn-link" onclick="mostrarLogin()">Vuelve al inicio</button></p>
        </div>
    </div>
</div>

<div id="app-container" style="display: none;">
    <header>
        <div class="header-content">
            <h1>El99</h1>
            <div class="user-info">
                <span>Jugador: <strong id="nombreUsuarioActivo" class="accent-text">Nadie</strong></span>
                <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="panel">
            <div class="panel-header">
                <h2>Catálogo de Cartas</h2>
            </div>
            <div class="search-bar">
                <input type="text" id="inputBusqueda" placeholder="Ej: Black Lotus, Lightning Bolt...">
                <button onclick="buscarCarta()" class="btn-primary btn-search">Buscar</button>
            </div>
            <div id="resultadoBusqueda" class="card-preview">
                <div class="empty-state">Busca una carta para añadirla a tu lista de deseos.</div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-header">
                <h2>Tu Pedido Actual</h2>
            </div>
            <div class="table-wrapper">
                <table id="tablaCesta">
                    <thead>
                        <tr>
                            <th>Carta</th>
                            <th class="text-center">Cant.</th>
                            <th class="text-right">Precio</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoCesta"></tbody>
                </table>
            </div>
            <div class="cart-footer">
                <div class="total-box">
                    <span>Total Estimado:</span>
                    <span class="total-price"><span id="precioTotal">0.00</span>€</span>
                </div>
                <button id="btnEnviar" class="btn-confirmar" onclick="enviarPedidoFinal()">
                    Confirmar Pedido 📤
                </button>
            </div>
        </section>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
