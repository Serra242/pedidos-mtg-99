<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El99 - Nexo de Pedidos</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="auth-container" class="view-section active">
    <div class="auth-wrapper slide-up">
        <div class="auth-header">
            <h1>El99</h1>
            <p>Comunidad MTG Hub</p>
        </div>

        <div id="login-box" class="auth-box">
            <h2>Iniciar Sesión</h2>
            <form id="formLogin" onsubmit="iniciarSesion(event)">
                <div class="input-group">
                    <label>Usuario (Email)</label>
                    <input type="email" id="login-email" required placeholder="ejemplo@correo.com">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-pass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Entrar al Nexo</button>
            </form>
            <p class="auth-switch">¿Nuevo? <button type="button" class="btn-link" onclick="mostrarRegistro()">Crea tu perfil</button></p>
        </div>

        <div id="register-box" class="auth-box" style="display: none;">
            <h2>Nuevo Registro</h2>
            <form id="formRegister" onsubmit="registrarUsuario(event)">
                <div class="input-group">
                    <label>Nombre de Mago</label>
                    <input type="text" id="reg-user" required placeholder="Ej: Jace Beleren">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required placeholder="tu@email.com">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-pass" required placeholder="Mínimo 6 caracteres">
                </div>
                <button type="submit" class="btn-secondary">Crear Perfil</button>
            </form>
            <p class="auth-switch"><button type="button" class="btn-link" onclick="mostrarLogin()">Volver atrás</button></p>
        </div>
    </div>
</div>

<div id="app-container" class="view-section hidden">
    <header>
        <div class="header-content">
            <h1 class="logo">El99</h1>
            <div class="user-info">
                <span>Jugador: <strong id="nombreUsuarioActivo" class="accent-text">---</strong></span>
                <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="panel fade-in">
            <div class="panel-header">
                <h2>Catálogo de Cartas</h2>
            </div>
            <div class="search-bar">
                <input type="text" id="inputBusqueda" placeholder="Ej: Krenko, Black Lotus, Counterspell...">
                <button type="button" onclick="buscarCarta()" class="btn-primary btn-search">Buscar</button>
            </div>
            <div id="resultadoBusqueda" class="card-preview">
                <p class="empty-state">Inicia una búsqueda para añadir cartas a tu pedido.</p>
            </div>
        </section>

        <section class="panel fade-in" style="animation-delay: 0.1s;">
            <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin: 0;">Tu Lista de Deseos</h2>
                <div style="background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px; font-size: 0.85rem;">
                    Consumo semanal: <strong id="contadorSemanal" style="color: var(--naranja-el99);">0</strong> / 25
                </div>
            </div>
            
            <div class="table-wrapper" style="margin-top: 15px;">
                <table id="tablaCesta">
                    <thead>
                        <tr>
                            <th>Carta</th>
                            <th>Edición</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoCesta"></tbody>
                </table>
            </div>
            
            <div class="cart-footer">
                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="display: block; color: var(--texto-gris); font-size: 0.9rem; margin-bottom: 8px;">
                        👥 ¿Te unes con alguien para compartir envío y vendedores? (Opcional)
                    </label>
                    <input type="text" id="inputGrupo" placeholder="Ej: Me junto con Serra y Urza">
                </div>

                <button id="btnEnviar" class="btn-confirmar" onclick="enviarPedidoFinal()">
                    Enviar Pedido Oficial 📤
                </button>
            </div>
        </section>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
